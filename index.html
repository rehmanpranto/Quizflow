<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* background-color: #f3f4f6; */ /* Original background color, commented out or overridden by image */
            color: #1f2937;

            /* --- ADDED FOR BACKGROUND --- */
            background-image: url('unnamed.png'); /* <-- IMPORTANT: REPLACE THIS URL */
            background-size: cover; /* Cover the entire viewport */
            background-repeat: no-repeat; /* Do not repeat the image */
            background-position: center center; /* Center the image */
            background-attachment: fixed; /* Make the background fixed during scroll */
            /* --- END OF ADDED BACKGROUND --- */
        }
        h1, h2, h3, h4, h5, h6, .font-playfair {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }
        .btn {
            font-family: 'Roboto', sans-serif;
            transition: background-color 0.2s ease-in-out, box-shadow 0.1s ease-out, transform 0.1s ease-out;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem; /* 6px */
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px 0 rgba(0,0,0,0.06);
        }
        .btn-primary {
            background-color: #4f46e5; /* Indigo-600 */
            color: white;
        }
        .btn-primary:hover {
            background-color: #4338ca; /* Indigo-700 */
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background-color: #e5e7eb; /* Gray-200 */
            color: #1f2937; /* Gray-800 */
        }
        .btn-secondary:hover {
            background-color: #d1d5db; /* Gray-300 */
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            transform: translateY(-1px);
        }
        .form-input {
            border: 1px solid #d1d5db; /* Gray-300 */
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem; /* 6px */
            width: 100%;
            transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .form-input:focus {
            border-color: #4f46e5; /* Indigo-600 */
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.3);
            outline: none;
        }
        .container {
            max-width: 900px; /* Increased max-width for better layout */
            margin-left: auto;
            margin-right: auto;
            padding: 2rem;
        }
        .card {
            background-color: rgba(255, 255, 255, 0.1); /* Semi-transparent white background for readability on dark bg */
            backdrop-filter: blur(10px); /* Frosted glass effect */
            -webkit-backdrop-filter: blur(10px); /* Safari */
            border: 1px solid rgba(255, 255, 255, 0.2); /* Subtle border */
            padding: 2rem;
            border-radius: 0.75rem; /* 12px */
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            margin-bottom: 1.5rem;
        }
        .card-darker-text p, .card-darker-text li, .card-darker-text div, .card-darker-text span, .card-darker-text label {
            color: #e5e7eb; /* Lighter text color for dark background, Gray-200 */
        }
        .card-darker-text h1, .card-darker-text h2, .card-darker-text h3, .card-darker-text h4, .card-darker-text .font-playfair {
             color: #f9fafb; /* Even lighter for headings, Gray-50 */
        }
        .card-darker-text .form-input {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            color: #e5e7eb;
        }
        .card-darker-text .form-input::placeholder {
            color: #9ca3af; /* Gray-400 for placeholders */
        }
        .card-darker-text .btn-secondary {
            background-color: rgba(229, 231, 235, 0.2); /* Gray-200 with alpha */
            color: #f3f4f6; /* Gray-100 */
            border: 1px solid rgba(229, 231, 235, 0.4);
        }
        .card-darker-text .btn-secondary:hover {
            background-color: rgba(209, 213, 219, 0.3); /* Gray-300 with alpha */
        }

        /* Adjust link colors for better visibility on a dark background */
        a {
            color: #818cf8; /* Indigo-400 */
        }
        a:hover {
            color: #a7afff; /* Lighter Indigo */
        }
        .text-slate-700 { color: #cbd5e1 !important; } /* Slate-300 for better readability */
        .text-slate-800 { color: #e2e8f0 !important; } /* Slate-200 */
        .text-slate-600 { color: #94a3b8 !important; } /* Slate-400 */
        .text-green-600 { color: #34d399 !important; } /* Green-400 */
        .text-red-600 { color: #f87171 !important; } /* Red-400 */
        .text-blue-700 { color: #60a5fa !important; } /* Blue-400 */
        .text-blue-500 { color: #3b82f6 !important; } /* Blue-500 */
        .border-slate-300 { border-color: #475569 !important; } /* Slate-600 */
        .bg-slate-100 { background-color: rgba(51, 65, 85, 0.5) !important; } /* Slate-700 with alpha */


        /* Quiz Question Styling Adjustments for Dark Background */
        #quiz-container .bg-white, #quiz-questions div {
            background-color: rgba(255, 255, 255, 0.05) !important; /* Slightly transparent white for question cards */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #quiz-container p, #quiz-container label, #quiz-container div, #quiz-container span {
            color: #e5e7eb; /* Lighter text, Gray-200 */
        }
        #quiz-container .font-medium {
            color: #f9fafb; /* Even lighter for question text, Gray-50 */
        }

        /* Submission details card text color adjustments */
        #submission-detail-view .card p,
        #submission-detail-view .card span,
        #submission-detail-view .card li,
        #submission-detail-view .card div {
            color: #e5e7eb; /* Gray-200 */
        }
        #submission-detail-view .card h3,
        #submission-detail-view .card .font-semibold {
             color: #f9fafb; /* Gray-50 */
        }
        #submission-detail-view .text-green-700 { color: #34d399 !important; } /* Green-400 */
        #submission-detail-view .text-red-700 { color: #f87171 !important; } /* Red-400 */
        #submission-detail-view .text-blue-700 { color: #60a5fa !important; } /* Blue-400 */


        /* General visibility improvements for other elements */
        .text-gray-700 { color: #d1d5db !important; } /* Gray-300 */
        .text-gray-500 { color: #9ca3af !important; } /* Gray-400 */
        .text-gray-900 { color: #f9fafb !important; } /* Gray-50 */


        #timer {
            color: #f9fafb; /* Lighter color for timer */
        }

        /* Ensure modal content is readable */
        #submission-detail-modal-content {
            background-color: rgba(30, 41, 59, 0.9) !important; /* Darker slate with alpha */
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #submission-detail-modal-content p,
        #submission-detail-modal-content span,
        #submission-detail-modal-content li,
        #submission-detail-modal-content div,
        #submission-detail-modal-content h3 {
            color: #e5e7eb; /* Gray-200 */
        }
        #submission-detail-modal-content .font-semibold {
             color: #f9fafb; /* Gray-50 */
        }
        #submission-detail-modal-content .text-green-700 { color: #34d399 !important; }
        #submission-detail-modal-content .text-red-700 { color: #f87171 !important; }
        #submission-detail-modal-content .text-blue-700 { color: #60a5fa !important; }
        #submission-detail-modal-content .bg-slate-50 { background-color: rgba(51, 65, 85, 0.7) !important; } /* Slate-700 with alpha for question items */

    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center pt-8 pb-8">

    <div id="app-container" class="container">
        <header class="text-center mb-10">
            <h1 class="text-6xl font-playfair mb-2 text-white" style="text-shadow: 2px 2px 8px rgba(0,0,0,0.7);">QuizFlow</h1>
            <p class="text-xl text-indigo-200" style="text-shadow: 1px 1px 4px rgba(0,0,0,0.5);">Unleash Your Inner Genius!</p>
        </header>

        <div id="login-view" class="card card-darker-text">
            <h2 class="text-3xl font-playfair mb-6 text-center">Login</h2>
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="login-email" class="block text-sm font-medium">Email</label>
                    <input type="email" id="login-email" name="email" required class="form-input mt-1">
                </div>
                <div>
                    <label for="login-password" class="block text-sm font-medium">Password</label>
                    <input type="password" id="login-password" name="password" required class="form-input mt-1">
                </div>
                <button type="submit" class="btn btn-primary w-full">Login</button>
            </form>
            <p id="login-message" class="mt-4 text-center text-sm"></p>
            <p class="mt-6 text-center text-sm">
                Don't have an account? <a href="#" onclick="toggleAuthView('register'); return false;" class="font-medium hover:underline">Register here</a>
            </p>
        </div>

        <div id="register-view" class="card card-darker-text" style="display: none;">
            <h2 class="text-3xl font-playfair mb-6 text-center">Create Account</h2>
            <form id="register-form" class="space-y-6">
                <div>
                    <label for="register-username" class="block text-sm font-medium">Username</label>
                    <input type="text" id="register-username" name="username" required class="form-input mt-1">
                </div>
                <div>
                    <label for="register-email" class="block text-sm font-medium">Email</label>
                    <input type="email" id="register-email" name="email" required class="form-input mt-1">
                </div>
                <div>
                    <label for="register-password" class="block text-sm font-medium">Password</label>
                    <input type="password" id="register-password" name="password" required class="form-input mt-1">
                </div>
                <button type="submit" class="btn btn-primary w-full">Register</button>
            </form>
            <p id="register-message" class="mt-4 text-center text-sm"></p>
            <p class="mt-6 text-center text-sm">
                Already have an account? <a href="#" onclick="toggleAuthView('login'); return false;" class="font-medium hover:underline">Login here</a>
            </p>
        </div>

        <div id="quiz-selection-view" class="card card-darker-text" style="display: none;">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-playfair">Available Quizzes</h2>
                <button onclick="logoutUser()" class="btn btn-secondary">Logout</button>
            </div>
            <div id="quiz-list" class="space-y-4">
                </div>
            <p id="quiz-selection-message" class="mt-4 text-sm"></p>
            <button onclick="showUserSubmissions()" class="btn btn-primary w-full mt-6">View My Submissions</button>
        </div>

        <div id="quiz-view" style="display: none;" class="card card-darker-text">
            <div class="flex justify-between items-center mb-4">
                <h2 id="quiz-title" class="text-3xl font-playfair">Quiz Title</h2>
                <div id="timer" class="text-2xl font-semibold">00:00</div>
            </div>
            <form id="quiz-form">
                <div id="quiz-questions" class="space-y-6">
                    </div>
                <button type="submit" class="btn btn-primary w-full mt-8">Submit Quiz</button>
            </form>
            <button onclick="goBackToQuizSelection()" class="btn btn-secondary w-full mt-4">Back to Quizzes</button>
        </div>

        <div id="submission-result-view" style="display: none;" class="card card-darker-text">
            <h2 class="text-3xl font-playfair mb-4">Quiz Results</h2>
            <div id="result-summary" class="mb-6">
                </div>
            <div id="detailed-feedback" class="space-y-4">
                </div>
            <button onclick="goBackToQuizSelection()" class="btn btn-primary w-full mt-6">Back to Quizzes</button>
        </div>

        <div id="user-submissions-view" style="display: none;" class="card card-darker-text">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-playfair">My Submissions</h2>
                <button onclick="goBackToQuizSelection()" class="btn btn-secondary">Back to Quizzes</button>
            </div>
            <div id="submissions-list-container" class="space-y-4">
                </div>
            <p id="user-submissions-message" class="mt-4 text-sm"></p>
        </div>
    </div>

    <div id="submission-detail-modal" class="fixed inset-0 bg-gray-800 bg-opacity-75 flex items-center justify-center p-4" style="display:none; z-index: 50;">
        <div id="submission-detail-modal-content" class="bg-slate-800 p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 id="submission-detail-quiz-title" class="text-2xl font-semibold text-gray-100">Submission Details</h3>
                <button onclick="closeSubmissionDetailModal()" class="text-gray-300 hover:text-gray-100 text-2xl leading-none">&times;</button>
            </div>
            <div id="submission-detail-summary" class="mb-4 text-gray-200">
                </div>
            <h4 class="text-xl font-semibold mb-3 text-gray-100">Question Breakdown:</h4>
            <div id="submission-detail-questions" class="space-y-3">
                </div>
        </div>
    </div>


    <script>
        const API_URL = 'http://localhost:5000/api'; // Change if your backend is hosted elsewhere
        let currentQuizTimer = null;
        let timeRemaining = 0;

        // --- DOM Elements ---
        const views = {
            login: document.getElementById('login-view'),
            register: document.getElementById('register-view'),
            quizSelection: document.getElementById('quiz-selection-view'),
            quiz: document.getElementById('quiz-view'),
            submissionResult: document.getElementById('submission-result-view'),
            userSubmissions: document.getElementById('user-submissions-view')
        };
        const appContainer = document.getElementById('app-container');

        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const quizListDiv = document.getElementById('quiz-list');
        const quizForm = document.getElementById('quiz-form');
        const quizQuestionsDiv = document.getElementById('quiz-questions');
        const quizTitleEl = document.getElementById('quiz-title');
        const timerEl = document.getElementById('timer');
        const resultSummaryDiv = document.getElementById('result-summary');
        const detailedFeedbackDiv = document.getElementById('detailed-feedback');
        const submissionsListContainer = document.getElementById('submissions-list-container');

        const loginMessageEl = document.getElementById('login-message');
        const registerMessageEl = document.getElementById('register-message');
        const quizSelectionMessageEl = document.getElementById('quiz-selection-message');
        const userSubmissionsMessageEl = document.getElementById('user-submissions-message');


        // --- Helper Functions ---
        function showView(viewName) {
            Object.values(views).forEach(view => view.style.display = 'none');
            if (views[viewName]) {
                views[viewName].style.display = 'block';
            }
            // If switching to a view that should be centered, ensure body styles facilitate this.
            if (['login', 'register'].includes(viewName)) {
                document.body.classList.add('items-center', 'justify-center');
                appContainer.classList.remove('container'); // Use full width for auth cards
                appContainer.classList.add('w-full', 'max-w-md');
            } else {
                document.body.classList.remove('justify-center');
                document.body.classList.add('items-start', 'md:items-center'); // Adjust for longer content
                appContainer.classList.remove('w-full', 'max-w-md');
                appContainer.classList.add('container'); // Restore container class for other views
            }
        }


        function toggleAuthView(viewName) {
            showView(viewName);
        }

        function displayMessage(element, message, isError = false) {
            if (element) {
                element.textContent = message;
                element.className = isError ? 'mt-4 text-center text-sm text-red-400' : 'mt-4 text-center text-sm text-green-400';
            }
        }

        function startTimer(durationInSeconds) {
            timeRemaining = durationInSeconds;
            updateTimerDisplay();
            if (currentQuizTimer) clearInterval(currentQuizTimer);
            currentQuizTimer = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                if (timeRemaining <= 0) {
                    clearInterval(currentQuizTimer);
                    alert("Time's up! Submitting your quiz.");
                    submitQuiz(); // Auto-submit
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            timerEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function stopTimer() {
            clearInterval(currentQuizTimer);
            currentQuizTimer = null;
        }

        function goBackToQuizSelection() {
            stopTimer();
            showView('quizSelection');
            loadQuizzes(); // Refresh quiz list
        }

        // --- API Calls & Logic ---
        async function handleAuth(url, formData, messageEl, successView) {
            messageEl.textContent = '';
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(Object.fromEntries(formData))
                });
                const result = await response.json();
                if (response.ok && result.token) {
                    localStorage.setItem('quizFlowToken', result.token);
                    localStorage.setItem('quizFlowUser', JSON.stringify(result.user));
                    displayMessage(messageEl, result.message || 'Success!', false);
                    showView(successView);
                    if (successView === 'quizSelection') loadQuizzes();
                } else {
                    displayMessage(messageEl, result.message || 'An error occurred.', true);
                }
            } catch (error) {
                console.error(`Error during auth:`, error);
                displayMessage(messageEl, `Network error: ${error.message}`, true);
            }
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            handleAuth(`${API_URL}/auth/login`, new FormData(loginForm), loginMessageEl, 'quizSelection');
        });

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            handleAuth(`${API_URL}/auth/register`, new FormData(registerForm), registerMessageEl, 'login');
        });

        function logoutUser() {
            localStorage.removeItem('quizFlowToken');
            localStorage.removeItem('quizFlowUser');
            showView('login');
            loginMessageEl.textContent = 'You have been logged out.';
            loginMessageEl.className = 'mt-4 text-center text-sm text-indigo-300';
        }

        async function loadQuizzes() {
            const token = localStorage.getItem('quizFlowToken');
            if (!token) {
                showView('login');
                loginMessageEl.textContent = "Your session expired. Please login again.";
                loginMessageEl.className = 'mt-4 text-center text-sm text-red-400';
                return;
            }
            quizSelectionMessageEl.textContent = 'Loading quizzes...';
            try {
                const response = await fetch(`${API_URL}/quizzes`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401) { // Unauthorized
                    logoutUser();
                    return;
                }
                const result = await response.json();
                if (response.ok) {
                    quizListDiv.innerHTML = ''; // Clear previous list
                    if (result.quizzes && result.quizzes.length > 0) {
                        result.quizzes.forEach(quiz => {
                            const quizCard = `
                                <div class="p-4 border border-slate-600 rounded-lg shadow hover:shadow-lg transition-shadow bg-slate-700 bg-opacity-50">
                                    <h3 class="text-xl font-semibold text-indigo-300 mb-2">${quiz.title}</h3>
                                    <p class="text-sm text-slate-300 mb-1">Category: ${quiz.category || 'General'}</p>
                                    <p class="text-sm text-slate-300 mb-3">Questions: ${quiz.question_count || 'N/A'}</p>
                                    <button onclick="startQuiz(${quiz.quiz_id}, ${quiz.time_limit_seconds || 300})" class="btn btn-primary w-full sm:w-auto">Start Quiz</button>
                                </div>`;
                            quizListDiv.insertAdjacentHTML('beforeend', quizCard);
                        });
                        quizSelectionMessageEl.textContent = '';
                    } else {
                        quizSelectionMessageEl.textContent = 'No quizzes available at the moment.';
                        quizSelectionMessageEl.className = 'mt-4 text-sm text-slate-400';
                    }
                } else {
                    quizSelectionMessageEl.textContent = result.message || 'Failed to load quizzes.';
                    quizSelectionMessageEl.className = 'mt-4 text-sm text-red-400';
                }
            } catch (error) {
                console.error('Error loading quizzes:', error);
                quizSelectionMessageEl.textContent = `Network error: ${error.message}`;
                quizSelectionMessageEl.className = 'mt-4 text-sm text-red-400';
            }
        }

        async function startQuiz(quizId, timeLimit) {
            const token = localStorage.getItem('quizFlowToken');
            if (!token) { logoutUser(); return; }

            try {
                const response = await fetch(`${API_URL}/quizzes/${quizId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401) { logoutUser(); return; }
                const result = await response.json();

                if (response.ok && result.quiz) {
                    const quiz = result.quiz;
                    quizTitleEl.textContent = quiz.title;
                    quizQuestionsDiv.innerHTML = ''; // Clear previous questions
                    quiz.questions.forEach((q, index) => {
                        let optionsHTML = '';
                        if (q.options && q.options.length > 0) {
                           optionsHTML = q.options.map(opt => `
                                <label class="block p-3 rounded-md border border-slate-600 hover:bg-slate-700 cursor-pointer transition-colors">
                                    <input type="radio" name="question_${q.question_id}" value="${opt.option_id}" required class="mr-3 accent-indigo-500">
                                    ${opt.option_text}
                                </label>
                            `).join('');
                        } else { // Fallback for potential True/False or other types if options are empty
                            optionsHTML = `
                                <label class="block p-3 rounded-md border border-slate-600 hover:bg-slate-700 cursor-pointer transition-colors">
                                    <input type="radio" name="question_${q.question_id}" value="true" required class="mr-3 accent-indigo-500"> True
                                </label>
                                <label class="block p-3 rounded-md border border-slate-600 hover:bg-slate-700 cursor-pointer transition-colors">
                                    <input type="radio" name="question_${q.question_id}" value="false" class="mr-3 accent-indigo-500"> False
                                </label>`;
                        }

                        const questionElement = `
                            <div class="p-4 rounded-lg shadow bg-slate-700 bg-opacity-70" data-question-id="${q.question_id}">
                                <p class="font-medium text-slate-200 mb-3">${index + 1}. ${q.question_text}</p>
                                <div class="space-y-2">${optionsHTML}</div>
                            </div>`;
                        quizQuestionsDiv.insertAdjacentHTML('beforeend', questionElement);
                    });
                    quizForm.dataset.quizId = quizId;
                    showView('quiz');
                    startTimer(timeLimit);
                } else {
                    quizSelectionMessageEl.textContent = result.message || "Could not load quiz details.";
                    quizSelectionMessageEl.className = 'mt-4 text-sm text-red-400';
                }
            } catch (error) {
                console.error('Error starting quiz:', error);
                 quizSelectionMessageEl.textContent = `Network error: ${error.message}`;
                 quizSelectionMessageEl.className = 'mt-4 text-sm text-red-400';
            }
        }

        quizForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            stopTimer();
            submitQuiz();
        });

        async function submitQuiz() {
            const token = localStorage.getItem('quizFlowToken');
            if (!token) { logoutUser(); return; }

            const quizId = quizForm.dataset.quizId;
            const answers = [];
            const formData = new FormData(quizForm);

            // Group answers by question_id
            const answersByQuestion = {};
            for (let [key, value] of formData.entries()) {
                if (key.startsWith('question_')) {
                    const questionId = key.split('_')[1];
                    answersByQuestion[questionId] = value; // Assuming radio buttons, so one value per question
                }
            }

            // Format for backend
            Object.keys(answersByQuestion).forEach(questionId => {
                answers.push({
                    question_id: parseInt(questionId),
                    selected_option_id: parseInt(answersByQuestion[questionId])
                });
            });


            try {
                const response = await fetch(`${API_URL}/quizzes/${quizId}/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ answers: answers })
                });
                if (response.status === 401) { logoutUser(); return; }
                const result = await response.json();

                if (response.ok) {
                    displaySubmissionResult(result.submission);
                    showView('submissionResult');
                } else {
                    resultSummaryDiv.innerHTML = `<p class="text-red-400">Error submitting quiz: ${result.message || 'Unknown error'}</p>`;
                    detailedFeedbackDiv.innerHTML = '';
                    showView('submissionResult'); // Still show result view but with error
                }
            } catch (error) {
                console.error('Error submitting quiz:', error);
                resultSummaryDiv.innerHTML = `<p class="text-red-400">Network error: ${error.message}</p>`;
                detailedFeedbackDiv.innerHTML = '';
                showView('submissionResult');
            }
        }

        function displaySubmissionResult(submission) {
            resultSummaryDiv.innerHTML = `
                <p class="text-xl mb-2">Quiz: <span class="font-semibold text-indigo-300">${submission.quiz_title || 'N/A'}</span></p>
                <p class="text-2xl font-bold mb-1">Your Score: <span class="${submission.score >= 70 ? 'text-green-400' : 'text-red-400'}">${submission.score}%</span> (${submission.correct_answers} out of ${submission.total_questions})</p>
                <p class="text-slate-300 mb-4">Submitted on: ${new Date(submission.submitted_at).toLocaleString()}</p>
                <p class="text-lg">${submission.feedback || 'Well done!'}</p>
            `;

            detailedFeedbackDiv.innerHTML = '<h3 class="text-xl font-semibold mt-6 mb-3 text-slate-100">Detailed Feedback:</h3>';
            if (submission.questions && submission.questions.length > 0) {
                submission.questions.forEach((q, index) => {
                    const correctnessClass = q.is_correct ? 'text-green-400' : 'text-red-400';
                    const correctnessText = q.is_correct ? 'Correct' : 'Incorrect';
                    let answerHTML = `<span class="${correctnessClass} font-semibold">${correctnessText}</span>. Your answer: ${q.selected_answer_text || 'Not answered'}.`;
                    if (!q.is_correct) {
                        answerHTML += `<br><span class="text-blue-400">Correct Answer: ${q.correct_answer_text}</span>`;
                    }
                     if (q.explanation) {
                        answerHTML += `<br><em class="text-sm text-slate-400">Explanation: ${q.explanation}</em>`;
                    }

                    const questionDiv = `
                        <div class="p-3 border border-slate-600 rounded-md bg-slate-700 bg-opacity-50">
                            <p class="font-medium text-slate-200 mb-1">${index + 1}. ${q.question_text}</p>
                            <p class="text-sm text-slate-300">${answerHTML}</p>
                        </div>`;
                    detailedFeedbackDiv.insertAdjacentHTML('beforeend', questionDiv);
                });
            } else {
                detailedFeedbackDiv.insertAdjacentHTML('beforeend', '<p class="text-slate-400">No detailed feedback available for this submission.</p>');
            }
        }

        async function showUserSubmissions() {
            const token = localStorage.getItem('quizFlowToken');
            if (!token) { logoutUser(); return; }

            showView('userSubmissions');
            userSubmissionsMessageEl.textContent = "Loading your submissions...";
            submissionsListContainer.innerHTML = ""; // Clear previous

            try {
                const response = await fetch(`${API_URL}/users/me/submissions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401) { logoutUser(); return; }
                const result = await response.json();

                if (response.ok && result.submissions) {
                    if (result.submissions.length > 0) {
                        result.submissions.forEach(sub => {
                            const submissionItem = `
                                <div class="p-4 border border-slate-600 rounded-lg shadow bg-slate-700 bg-opacity-50">
                                    <h3 class="text-lg font-semibold text-indigo-300">${sub.quiz_title}</h3>
                                    <p class="text-sm text-slate-300">Score: ${sub.score}% (${sub.correct_answers}/${sub.total_questions})</p>
                                    <p class="text-xs text-slate-400 mb-2">Date: ${new Date(sub.submitted_at).toLocaleString()}</p>
                                    <button onclick="viewSubmissionDetail(${sub.submission_id})" class="btn btn-sm btn-primary text-xs py-1 px-2">View Details</button>
                                </div>`;
                            submissionsListContainer.insertAdjacentHTML('beforeend', submissionItem);
                        });
                        userSubmissionsMessageEl.textContent = "";
                    } else {
                        userSubmissionsMessageEl.textContent = "You haven't submitted any quizzes yet.";
                        userSubmissionsMessageEl.className = 'mt-4 text-sm text-slate-400';
                    }
                } else {
                    userSubmissionsMessageEl.textContent = result.message || "Could not load submissions.";
                    userSubmissionsMessageEl.className = 'mt-4 text-sm text-red-400';
                }
            } catch (error) {
                console.error("Error fetching user submissions:", error);
                userSubmissionsMessageEl.textContent = `Network error: ${error.message}`;
                userSubmissionsMessageEl.className = 'mt-4 text-sm text-red-400';
            }
        }

        function closeSubmissionDetailModal() {
            document.getElementById('submission-detail-modal').style.display = 'none';
        }

        async function viewSubmissionDetail(submissionId) {
            const token = localStorage.getItem('quizFlowToken');
            if (!token) { logoutUser(); return; }

            document.getElementById('submission-detail-quiz-title').textContent = "Loading...";
            document.getElementById('submission-detail-summary').innerHTML = "";
            document.getElementById('submission-detail-questions').innerHTML = "";
            document.getElementById('submission-detail-modal').style.display = 'flex';

            try {
                const response = await fetch(`${API_URL}/submissions/${submissionId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401) { logoutUser(); closeSubmissionDetailModal(); return; }
                const result = await response.json();

                if (response.ok && result.submission) {
                    const sub = result.submission;
                    document.getElementById('submission-detail-quiz-title').textContent = sub.quiz_title || "Submission Details";
                    document.getElementById('submission-detail-summary').innerHTML = `
                        <p>Score: <span class="font-semibold ${sub.score >= 70 ? 'text-green-400' : 'text-red-400'}">${sub.score}%</span> (${sub.correct_answers} / ${sub.total_questions} correct)</p>
                        <p>Date: ${new Date(sub.submitted_at).toLocaleString()}</p>
                        ${sub.feedback ? `<p class="mt-2"><em>${sub.feedback}</em></p>` : ''}
                    `;
                    const questionsContainer = document.getElementById('submission-detail-questions');
                    questionsContainer.innerHTML = ""; // Clear previous
                    if (sub.questions && sub.questions.length > 0) {
                        sub.questions.forEach((q, index) => {
                            const qDiv = document.createElement('div');
                            qDiv.className = `p-3 rounded-md border ${q.is_correct ? 'border-green-600' : 'border-red-600'} bg-slate-700 mb-2`;
                            let answerHTML = `<p class="text-sm">Your answer: <span class="font-semibold ${q.is_correct ? 'text-green-400' : 'text-red-400'}">${q.selected_answer_text || 'Not answered'}</span></p>`;
                            if (!q.is_correct) {
                                answerHTML += `<p class="text-sm text-blue-400 mt-1">Correct Answer: ${q.correct_answer_text}</p>`;
                            }
                             if (q.explanation) {
                                answerHTML += `<p class="text-xs text-slate-400 mt-1"><em>Explanation: ${q.explanation}</em></p>`;
                            }
                            qDiv.innerHTML = `<p class="font-medium text-slate-200 mb-2">${index + 1}. ${q.question_text}</p>${answerHTML}`;
                            questionsContainer.appendChild(qDiv);
                        });
                    } else { questionsContainer.innerHTML = "<p class='text-slate-400'>No detailed question breakdown available.</p>"; }
                } else {
                    document.getElementById('submission-detail-quiz-title').textContent = "Error";
                    document.getElementById('submission-detail-summary').innerHTML = `<p class="text-red-400">Could not load details: ${result.message}</p>`;
                }
            } catch (error) {
                console.error("Error fetching submission details:", error);
                document.getElementById('submission-detail-quiz-title').textContent = "Error";
                document.getElementById('submission-detail-summary').innerHTML = `<p class="text-red-400">Error loading details: ${error.message}</p>`;
            }
        }
        // Ensure the initial view is set up correctly
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('quizFlowToken');
            if (token) {
                showView('quizSelection');
                loadQuizzes();
            } else {
                showView('login');
            }
        });

    </script>
</body>
</html>
