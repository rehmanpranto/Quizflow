<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif; /* Default to Roboto for general UI */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        /* Apply Playfair Display to headings */
        h1, h2, h3, h4, h5, h6, .font-playfair {
            font-family: 'Playfair Display', serif;
            font-weight: 700; /* Playfair Display often looks best bold */
        }
        .btn {
            font-family: 'Roboto', sans-serif; /* Buttons with Roboto */
            transition: background-color 0.2s ease-in-out, box-shadow 0.1s ease-out, transform 0.1s ease-out;
            border-radius: 0.5rem;
            padding: 0.875rem 1.5rem;
            font-weight: 500; /* Roboto medium */
            text-align: center;
            cursor: pointer;
            letter-spacing: 0.025em;
        }
        .btn-primary {
            background-color: #3b82f6;
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #2563eb;
        }
        .btn-primary:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        .btn-secondary {
            background-color: #e5e7eb;
            color: #1f2937;
        }
        .btn-secondary:hover {
            background-color: #d1d5db;
        }
        .btn:active:not(:disabled) {
            transform: scale(0.98);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.07);
        }
        .input-field {
            font-family: 'Roboto', sans-serif; /* Inputs with Roboto */
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            padding: 0.875rem 1rem;
            width: 100%;
            transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        .card {
            background-color: white;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            padding: 2rem;
        }
        .option-label input[type="radio"]:focus-visible + .option-content {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
            border-radius: 0.375rem;
        }
        .option-label input[type="radio"]:checked + .option-content {
             font-weight: 500; /* Roboto medium for selected option */
             color: #1e40af;
        }
        .option-label.selected .option-content {
            background-color: #eff6ff;
            border-color: #60a5fa;
        }
        .option-content {
            font-family: 'Roboto', sans-serif; /* Options text with Roboto */
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;
            transition: background-color 0.15s ease-in-out, border-color 0.15s ease-in-out;
        }
        .option-label:hover .option-content {
            background-color: #f9fafb;
            border-color: #9ca3af;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 3px;}
        ::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 3px;}
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        @keyframes modal-pop-in { 0% { transform: translateY(20px) scale(0.98); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        .animate-modal-pop-in { animation: modal-pop-in 0.25s ease-out forwards; }
        .auth-toggle-link {
            font-family: 'Roboto', sans-serif;
            color: #3b82f6;
            font-weight: 500;
            cursor: pointer;
        }
        .auth-toggle-link:hover {
            text-decoration: underline;
            color: #2563eb;
        }
         #progress-bar-fill {
            transition: width 0.3s ease-in-out;
        }
        /* Tailwind class overrides for font */
        .text-3xl.font-extrabold { font-family: 'Playfair Display', serif; font-weight: 900; } /* Example for very bold Playfair */
        .text-2xl.font-bold, .text-3xl.font-bold { font-family: 'Playfair Display', serif; font-weight: 700; }
        .text-xl.font-semibold { font-family: 'Playfair Display', serif; font-weight: 700; } /* Or Roboto semibold if preferred */

    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 selection:bg-blue-500 selection:text-white">

    <div class="container w-full max-w-xl mx-auto">

        <div id="login-section" class="card space-y-6">
            <div class="text-center mb-6">
                <svg class="w-16 h-16 mx-auto text-blue-600 mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline> </svg>
                <h1 class="text-3xl font-extrabold text-slate-900">QuizFlow Login</h1>
                <p class="text-slate-500 mt-1.5 text-base">Please sign in to begin.</p>
            </div>
            <div>
                <label for="login-email" class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wider">Email Address</label>
                <input type="email" id="login-email" placeholder="Enter your email" class="input-field">
            </div>
            <div>
                <label for="login-password" class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wider">Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" class="input-field">
            </div>
            <button onclick="login()" id="login-button" class="w-full btn btn-primary">
                Login & Start Quiz
            </button>
            <p class="text-center text-sm text-slate-600">
                Don't have an account? <span onclick="toggleAuthView('register')" class="auth-toggle-link">Register here</span>
            </p>
        </div>

        <div id="register-section" style="display: none;" class="card space-y-6">
            <div class="text-center mb-6">
                 <svg class="w-16 h-16 mx-auto text-blue-600 mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="17" y1="11" x2="23" y2="11"></line>
                </svg>
                <h1 class="text-3xl font-extrabold text-slate-900">Create Account</h1>
                <p class="text-slate-500 mt-1.5 text-base">Join QuizFlow today!</p>
            </div>
            <div>
                <label for="register-email" class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wider">Email Address</label>
                <input type="email" id="register-email" placeholder="Enter your email" class="input-field">
            </div>
            <div>
                <label for="register-password" class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wider">Password</label>
                <input type="password" id="register-password" placeholder="Choose a password (min. 6 characters)" class="input-field">
            </div>
             <div>
                <label for="register-confirm-password" class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wider">Confirm Password</label>
                <input type="password" id="register-confirm-password" placeholder="Confirm your password" class="input-field">
            </div>
            <button onclick="register()" id="register-button" class="w-full btn btn-primary">
                Register
            </button>
            <p class="text-center text-sm text-slate-600">
                Already have an account? <span onclick="toggleAuthView('login')" class="auth-toggle-link">Login here</span>
            </p>
        </div>


        <div id="quiz-section" style="display: none;" class="card">
            <div class="flex flex-col sm:flex-row justify-between sm:items-center mb-6 pb-4 border-b border-slate-200">
                <h2 id="quiz-title" class="text-2xl sm:text-3xl font-bold text-slate-900 mb-2 sm:mb-0">Quiz Time!</h2>
                <div class="flex items-center space-x-2 sm:space-x-4 mt-2 sm:mt-0">
                    <div id="timer" class="text-lg sm:text-xl font-semibold text-red-600 bg-red-100 px-3 py-1 sm:px-4 sm:py-1.5 rounded-md font-roboto">00:00</div>
                    <div id="progress-bar-container" class="w-28 sm:w-40">
                        <div class="text-xs text-slate-500 mb-0.5 text-right font-roboto">Progress: <span id="progress-text">0%</span></div>
                        <div class="w-full bg-slate-200 rounded-full h-2 sm:h-2.5">
                            <div id="progress-bar-fill" class="bg-blue-600 h-2 sm:h-2.5 rounded-full" style="width: 0%;"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mb-5 p-3 bg-yellow-50 border border-yellow-300 text-yellow-700 rounded-md text-sm">
                <div class="flex items-center">
                    <svg class="h-5 w-5 text-yellow-500 mr-2 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 5a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 5zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" />
                    </svg>
                    <p>Stay focused. Navigating away may end the quiz.</p>
                </div>
            </div>
            <div id="question-container" class="space-y-8">
                </div>
            <button onclick="submitQuizConfirm()" id="submit-quiz-button" class="w-full mt-10 btn btn-primary bg-green-600 hover:bg-green-700">
                Submit Quiz
            </button>
        </div>

        <div id="result-section" style="display: none;" class="card text-center space-y-6">
            <h2 class="text-3xl font-bold text-slate-900">Quiz Result</h2>
            <div id="result-details" class="bg-slate-50 p-6 rounded-lg border border-slate-200">
                <p id="user-email-result" class="text-xl font-playfair font-semibold text-slate-700 mb-3"></p>
                <p id="result-score" class="text-4xl font-playfair font-extrabold text-blue-600 mb-1"></p> <p id="result-percentage" class="text-lg text-slate-500 mb-4"></p>
                <div id="feedback-message" class="text-base font-medium p-3 rounded-md"></div>
            </div>

            <div id="detailed-quiz-results" class="mt-6 text-left">
                </div>

            <div class="flex flex-col sm:flex-row justify-center sm:space-x-3 space-y-3 sm:space-y-0 mt-6">
                <button onclick="printResults()" id="print-results-button" class="w-full sm:w-auto btn btn-secondary">
                    Print Results
                </button>
                <button onclick="logoutAndRestart()" class="w-full sm:w-auto btn btn-primary">
                    Logout & Try Another Quiz
                </button>
            </div>
        </div>

        <div id="message-modal" style="display: none;" class="fixed inset-0 bg-slate-800 bg-opacity-50 backdrop-blur-sm overflow-y-auto h-full w-full flex items-center justify-center z-50 p-4">
            <div class="bg-white p-7 rounded-lg shadow-xl max-w-md w-full mx-auto transform transition-all duration-300 ease-out scale-95 opacity-0 animate-modal-pop-in">
                <h3 id="modal-title-element" class="text-xl font-playfair font-semibold mb-4 text-slate-800">Notification</h3>
                <div id="modal-message-element" class="text-slate-600 mb-6 text-sm leading-relaxed"></div> <div class="flex justify-end space-x-3">
                    <button id="modal-cancel-button" style="display:none;" onclick="closeModal()" class="btn btn-secondary text-sm py-2 px-4">
                        Cancel
                    </button>
                    <button id="modal-ok-button" onclick="closeModal()" class="btn btn-primary text-sm py-2 px-4">
                        OK
                    </button>
                    <button id="modal-confirm-button" style="display:none;" class="btn btn-primary bg-red-600 hover:bg-red-700 text-sm py-2 px-4">
                        Confirm
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let quizDataStore = [];
        let quizTimeLimit = 900;
        let quizTimerInterval;
        let currentUserEmailGlobal = "";
        let quizActive = false;
        let userFocusLossCount = 0;
        const MAX_USER_FOCUS_LOSS = 2;
        window.latestQuizResultForPrinting = null;
        let answeredQuestionsCount = 0;

        // DOM Elements
        const loginSection = document.getElementById("login-section");
        const registerSection = document.getElementById("register-section");
        const quizSection = document.getElementById("quiz-section");
        const resultSection = document.getElementById("result-section");
        const questionContainer = document.getElementById("question-container");
        const timerDisplay = document.getElementById("timer");
        const progressBarFill = document.getElementById("progress-bar-fill");
        const progressText = document.getElementById("progress-text");


        const loginEmailInput = document.getElementById("login-email");
        const loginPasswordInput = document.getElementById("login-password");
        const loginButton = document.getElementById("login-button");

        const registerEmailInput = document.getElementById("register-email");
        const registerPasswordInput = document.getElementById("register-password");
        const registerConfirmPasswordInput = document.getElementById("register-confirm-password");
        const registerButton = document.getElementById("register-button");

        const resultScoreDisplay = document.getElementById("result-score");
        const resultPercentageDisplay = document.getElementById("result-percentage");
        const userEmailResultDisplay = document.getElementById("user-email-result");
        const feedbackMessageDisplay = document.getElementById("feedback-message");
        const quizTitleDisplay = document.getElementById("quiz-title");
        const submitQuizButton = document.getElementById("submit-quiz-button");

        const messageModal = document.getElementById("message-modal");
        const modalTitleElement = document.getElementById("modal-title-element");
        const modalMessageElement = document.getElementById("modal-message-element");
        const modalOkButton = document.getElementById("modal-ok-button");
        const modalConfirmButton = document.getElementById("modal-confirm-button");
        const modalCancelButton = document.getElementById("modal-cancel-button");

        loginSection.style.display = "block";
        registerSection.style.display = "none";


        function toggleAuthView(view) {
            if (view === 'register') {
                loginSection.style.display = "none";
                registerSection.style.display = "block";
                registerEmailInput.focus();
            } else {
                registerSection.style.display = "none";
                loginSection.style.display = "block";
                loginEmailInput.focus();
            }
        }

        function showModal(title, message, type = "alert", onConfirm = null, onCancel = null) {
            modalTitleElement.textContent = title; // Will use Playfair from CSS
            modalMessageElement.innerHTML = message; // Uses Roboto from body
            messageModal.style.display = "flex";
            const modalContent = messageModal.firstElementChild;
            modalContent.classList.remove('animate-modal-pop-in');
            void modalContent.offsetWidth;
            modalContent.classList.add('animate-modal-pop-in');

            modalOkButton.style.display = (type === "alert") ? "inline-block" : "none";
            modalConfirmButton.style.display = (type === "confirm") ? "inline-block" : "none";
            modalCancelButton.style.display = (type === "confirm") ? "inline-block" : "none";

            if (type === "confirm") {
                modalConfirmButton.onclick = () => { closeModal(); if (onConfirm) onConfirm(); };
                modalCancelButton.onclick = () => { closeModal(); if (onCancel) onCancel(); };
            } else {
                modalOkButton.onclick = () => { closeModal(); if (onConfirm) onConfirm(); };
            }
        }

        function closeModal() { messageModal.style.display = "none"; }

        function handleVisibilityChange() {
            if (!quizActive || !document.hidden) return;
            userFocusLossCount++;
            let msg = `Warning ${userFocusLossCount}/${MAX_USER_FOCUS_LOSS}: You've navigated away from the quiz. <br>Please remain on this tab to avoid quiz termination.`;
            if (userFocusLossCount >= MAX_USER_FOCUS_LOSS) {
                msg += "<br>The quiz will be submitted automatically if you navigate away again or after this warning.";
                showModal("Final Warning!", msg, "alert", () => { if (userFocusLossCount > MAX_USER_FOCUS_LOSS && quizActive) submitQuiz(); });
                if (userFocusLossCount > MAX_USER_FOCUS_LOSS && quizActive) submitQuiz();
            } else {
                showModal("Warning!", msg);
            }
        }
        function setupAntiCheatingListeners() { document.addEventListener("visibilitychange", handleVisibilityChange); }
        function removeAntiCheatingListeners() { document.removeEventListener("visibilitychange", handleVisibilityChange); }

        async function register() {
            const email = registerEmailInput.value.trim();
            const password = registerPasswordInput.value;
            const confirmPassword = registerConfirmPasswordInput.value;

            if (!email || !password || !confirmPassword) {
                showModal("Input Required", "Please fill in all registration fields."); return;
            }
            if (!/\S+@\S+\.\S+/.test(email)) {
                showModal("Invalid Email", "Please enter a valid email address."); return;
            }
            if (password.length < 6) {
                showModal("Password Too Short", "Password must be at least 6 characters long."); return;
            }
            if (password !== confirmPassword) {
                showModal("Password Mismatch", "Passwords do not match. Please re-enter.");
                registerConfirmPasswordInput.value = ""; registerConfirmPasswordInput.focus(); return;
            }

            registerButton.disabled = true;
            registerButton.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Registering...`;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const result = await response.json();
                if (response.status === 201 && result.success) {
                    showModal("Registration Successful!", result.message || "You can now log in with your email.", "alert", () => {
                        toggleAuthView('login');
                        loginEmailInput.value = email; loginPasswordInput.value = "";
                        registerEmailInput.value = ""; registerPasswordInput.value = ""; registerConfirmPasswordInput.value = "";
                        loginPasswordInput.focus();
                    });
                } else {
                    showModal("Registration Failed", result.message || "Could not register. The email might already be in use or input is invalid.");
                }
            } catch (error) {
                console.error("Registration API error:", error);
                showModal("Registration Error", "Could not connect to the registration service. Please try again later.");
            } finally {
                registerButton.disabled = false; registerButton.textContent = "Register";
            }
        }


        async function login() {
            const email = loginEmailInput.value.trim();
            const password = loginPasswordInput.value;
            if (!email || !password) {
                showModal("Input Required", "Please enter both email and password."); return;
            }
            loginButton.disabled = true;
            loginButton.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Authenticating...`;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    currentUserEmailGlobal = result.email;
                    loginSection.style.display = "none"; registerSection.style.display = "none";
                    await startQuizFlow();
                } else if (result.quiz_already_taken) {
                     showModal("Quiz Attempted", result.message || "You have already taken this quiz.");
                } else {
                    showModal("Login Failed", result.message || "Invalid email or password. Please check your credentials.");
                    loginPasswordInput.value = ""; loginEmailInput.focus();
                }
            } catch (error) {
                console.error("Login API error:", error);
                showModal("Login Error", "Could not connect to the login service. Please try again later.");
            } finally {
                loginButton.disabled = false; loginButton.textContent = "Login & Start Quiz";
            }
        }

        async function startQuizFlow() {
            quizSection.style.display = "block";
            resultSection.style.display = "none";
            submitQuizButton.disabled = false;
            quizActive = true; userFocusLossCount = 0;
            answeredQuestionsCount = 0;
            updateProgress();
            setupAntiCheatingListeners();
            await fetchQuizData();
            if (quizDataStore.length > 0) {
                loadQuiz(); startTimer();
            } else {
                showModal("Error Loading Quiz", "Could not load quiz data. Please try refreshing.");
                quizActive = false; removeAntiCheatingListeners();
                loginSection.style.display = "block"; quizSection.style.display = "none";
            }
        }

        async function fetchQuizData() {
            try {
                const response = await fetch('/api/quiz');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                quizDataStore = data.questions;
                quizTimeLimit = data.timeLimit || 900;
                quizTitleDisplay.textContent = data.title || "Quiz Challenge"; // Will use Playfair from CSS
            } catch (error) {
                console.error("Fetch quiz data error:", error);
                showModal("Fetch Error", "Could not retrieve quiz questions.");
                quizDataStore = [];
            }
        }

        function updateProgress() {
            if (!quizDataStore || quizDataStore.length === 0) {
                progressBarFill.style.width = '0%';
                progressText.textContent = '0%';
                return;
            }

            let count = 0;
            for (let i = 0; i < quizDataStore.length; i++) {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                if (sel) {
                    count++;
                }
            }
            answeredQuestionsCount = count;
            const percentage = Math.round((answeredQuestionsCount / quizDataStore.length) * 100);
            progressBarFill.style.width = `${percentage}%`;
            progressText.textContent = `${percentage}%`;
        }


        function loadQuiz() {
            questionContainer.innerHTML = "";
            answeredQuestionsCount = 0;

            quizDataStore.forEach((q, i) => {
                const qDiv = document.createElement("div");
                qDiv.className = "question bg-white border border-slate-200 p-6 rounded-lg";
                const optionsHTML = q.options.map((opt, j) => `
                    <label class="option-label flex items-center cursor-pointer group" data-question-index="${i}" data-option-index="${j}">
                        <input type="radio" name="q${i}" value="${j}" class="form-radio h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-400 shrink-0">
                        <span class="option-content ml-3 text-slate-700 text-sm group-hover:border-slate-400 flex-grow">${opt}</span>
                    </label>
                `).join("");
                // Question text will use Roboto from body, unless a specific class is added or Tailwind overrides are stronger
                qDiv.innerHTML = `
                    <p class="text-base font-medium text-slate-800 mb-4">${i + 1}. ${q.question}</p>
                    <div class="space-y-3">${optionsHTML}</div>`;
                questionContainer.appendChild(qDiv);
            });

            document.querySelectorAll('.option-label input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', (event) => {
                    document.querySelectorAll(`input[name="${event.target.name}"]`).forEach(r => {
                        r.closest('.option-label').classList.remove('selected');
                        r.closest('.option-label').querySelector('.option-content').style.backgroundColor = '';
                        r.closest('.option-label').querySelector('.option-content').style.borderColor = '';
                    });
                    if (event.target.checked) {
                        const parentLabel = event.target.closest('.option-label');
                        parentLabel.classList.add('selected');
                        parentLabel.querySelector('.option-content').style.backgroundColor = '#eff6ff';
                        parentLabel.querySelector('.option-content').style.borderColor = '#60a5fa';
                    }
                    updateProgress();
                });
            });
            updateProgress();
        }


        function startTimer() {
            let timeLeft = quizTimeLimit;
            timerDisplay.textContent = formatTime(timeLeft);
            clearInterval(quizTimerInterval);
            quizTimerInterval = setInterval(() => {
                if (!quizActive) { clearInterval(quizTimerInterval); return; }
                timeLeft--;
                timerDisplay.textContent = formatTime(timeLeft);
                if (timeLeft <= 0) {
                    clearInterval(quizTimerInterval);
                    if (quizActive) {
                         showModal("Time's Up!", "Your time has expired. Your answers will be submitted automatically.", "alert", () => {
                            if (quizActive) submitQuiz();
                        });
                    }
                }
            }, 1000);
        }

        function formatTime(s) { const m=Math.floor(s/60); const rs=s%60; return `${m.toString().padStart(2, '0')}:${rs.toString().padStart(2, '0')}`; }

        function submitQuizConfirm() {
            showModal("Confirm Submission", "Are you sure you want to submit your answers? This action cannot be undone.", "confirm", submitQuiz);
        }

        async function submitQuiz() {
            if (!quizActive) return;
            quizActive = false;
            removeAntiCheatingListeners();
            clearInterval(quizTimerInterval);
            submitQuizButton.disabled = true;
            submitQuizButton.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Submitting...`;

            const userAnswers = quizDataStore.map((q, i) => {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                return sel ? parseInt(sel.value) : null;
            });

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentUserEmailGlobal, answers: userAnswers }),
                });
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({ message: "An unknown error occurred during submission."}));
                    throw new Error(errData.message || `HTTP error! status: ${response.status}`);
                }
                const result = await response.json();
                if (result.success) {
                    window.latestQuizResultForPrinting = result;
                    displayResults(result.score, result.totalQuestions, result.percentage, result.feedback, result.detailed_results);
                } else {
                    showModal("Submission Blocked", result.message || "There was an issue submitting your quiz. It might have already been submitted.");
                    quizSection.style.display = "none"; resultSection.style.display = "none";
                    loginSection.style.display = "block"; currentUserEmailGlobal = "";
                }
            } catch (error) {
                console.error("Submit quiz error:", error);
                showModal("Submission Error", `Could not submit answers. ${error.message}.`);
                quizSection.style.display = "none"; loginSection.style.display = "block";
                currentUserEmailGlobal = "";
            } finally {
                submitQuizButton.disabled = false;
                submitQuizButton.textContent = "Submit Quiz";
            }
        }

        function displayResults(score, totalQuestions, percentage, feedback, detailed_results) {
            quizSection.style.display = "none";
            resultSection.style.display = "block";
            const userEmailNamePart = currentUserEmailGlobal.split('@')[0];
            userEmailResultDisplay.textContent = `Well done, ${userEmailNamePart}!`; // Will use Playfair from class
            resultScoreDisplay.textContent = `${score} / ${totalQuestions}`; // Will use Playfair from class
            resultPercentageDisplay.textContent = `Percentage: ${percentage.toFixed(1)}%`; // Roboto
            const feedbackEl = feedbackMessageDisplay;
            feedbackEl.textContent = feedback // Roboto
            feedbackEl.className = 'text-base font-medium p-3 rounded-md'; // Roboto default
            if (percentage >= 80) {
                feedbackEl.classList.add('bg-green-100', 'text-green-700');
            } else if (percentage >= 50) {
                feedbackEl.classList.add('bg-yellow-100', 'text-yellow-700');
            } else {
                feedbackEl.classList.add('bg-red-100', 'text-red-700');
            }

            const detailedContainer = document.getElementById('detailed-quiz-results');
            // Detailed Breakdown H3 will use Playfair from general h3 styling
            detailedContainer.innerHTML = '<h3 class="text-2xl font-semibold mb-4 text-slate-800 border-b pb-2">Detailed Breakdown:</h3>';
            const ul = document.createElement('ul');
            ul.className = 'space-y-4';

            if (detailed_results && detailed_results.length > 0) {
                detailed_results.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.className = 'p-4 rounded-md border border-slate-200';
                    const symbol = item.is_correct ? '✔' : '✘';
                    const correctnessClass = item.is_correct ? 'text-green-700' : 'text-red-700';
                    const answerBgClass = item.is_correct ? 'bg-green-50' : 'bg-red-50';

                    // Question text and answers in Roboto for readability
                    li.innerHTML = `
                        <p class="font-medium text-slate-700 mb-2">${index + 1}. ${item.question}</p>
                        <p class="${answerBgClass} p-3 rounded-md text-sm ${correctnessClass}">
                            Your Answer: ${item.your_answer} <span class="font-bold text-lg ml-1">${symbol}</span>
                        </p>
                        ${!item.is_correct ? `<p class="bg-blue-50 p-3 rounded-md text-sm text-blue-700 mt-2">Correct Answer: ${item.correct_answer}</p>` : ''}
                    `;
                    ul.appendChild(li);
                });
            } else {
                ul.innerHTML = '<li>No detailed breakdown available.</li>';
            }
            detailedContainer.appendChild(ul);
        }


        function printResults() {
            const quizResultData = window.latestQuizResultForPrinting;
            if (!quizResultData) {
                showModal("No Data", "No quiz result data found to print.");
                return;
            }

            let printHtml = `
                <html>
                <head>
                    <title>Quiz Results - ${quizResultData.title || 'QuizFlow Results'}</title>
                    <link rel="preconnect" href="https://fonts.googleapis.com">
                    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
                    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Roboto', sans-serif; margin: 20px; color: #1f2937; background-color: #fff; line-height: 1.6; }
                        .container-print { max-width: 800px; margin: 0 auto; padding: 20px; }
                        h1, h2 { font-family: 'Playfair Display', serif; color: #111827; }
                        h1 { text-align: center; font-size: 2.2em; font-weight: 900; margin-bottom: 0.5em; }
                        h2 { font-size: 1.6em; font-weight: 700; margin-bottom: 1em; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.5em;}
                        .summary-section { margin-bottom: 2em; padding: 1em; background-color: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.5rem;}
                        .summary-section p { font-size: 1.2em; margin: 0.5em 0; }
                        .summary-section strong { color: #3b82f6; /* Blue-600 */ }
                        .print-button-container { text-align: center; margin-top: 30px; padding-top:20px; border-top: 1px solid #e5e7eb;}
                        .print-button-container button { font-family: 'Roboto', sans-serif; font-weight: 500; }
                        @media print {
                            .print-button-container { display: none !important; }
                            body { margin: 0.5in; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                            h1,h2,p {font-size: 12pt;} /* Adjusted for better print readability */
                            .summary-section { border: 1px solid #ccc; background-color: #f9fafb !important; }
                        }
                    </style>
                </head>
                <body>
                    <div class="container-print">
                        <h1>Quiz Results</h1>
                        <div class="summary-section">
                            <h2>Summary</h2>
                            <p>User: <strong>${quizResultData.email}</strong></p>
                            <p>Score: <strong>${quizResultData.score} / ${quizResultData.totalQuestions}</strong></p>
                            <p>Percentage: <strong>${quizResultData.percentage.toFixed(1)}%</strong></p>
                            <p>Feedback: ${quizResultData.feedback}</p>
                        </div>

                        <div class="print-button-container">
                            <button onclick="window.print();" style="padding: 12px 24px; font-size: 16px; color: white; background-color: #3b82f6; border: none; border-radius: 5px; cursor: pointer;">Print this page</button>
                        </div>
                    </div>
                </body>
                </html>`;

            const printWindow = window.open('', '_blank');
            printWindow.document.write(printHtml);
            printWindow.document.close();
        }


        function logoutAndRestart() {
            currentUserEmailGlobal = "";
            loginEmailInput.value = ""; loginPasswordInput.value = "";
            registerEmailInput.value = ""; registerPasswordInput.value = ""; registerConfirmPasswordInput.value = "";
            quizDataStore = [];
            clearInterval(quizTimerInterval);
            quizActive = false; removeAntiCheatingListeners(); userFocusLossCount = 0;
            window.latestQuizResultForPrinting = null;
            answeredQuestionsCount = 0;
            if(progressBarFill) progressBarFill.style.width = '0%';
            if(progressText) progressText.textContent = '0%';
            resultSection.style.display = "none";
            quizSection.style.display = "none";
            loginSection.style.display = "block";
            toggleAuthView('login');
        }
    </script>
</body>
</html>
